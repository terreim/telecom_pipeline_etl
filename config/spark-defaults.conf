# ============================================================================
# Spark Default Configuration
# ============================================================================
# This file is auto-loaded by spark-submit, spark-shell, pyspark, etc.
# It sets defaults that apply to EVERY job submitted to this cluster.
#
# spark.driver.extraClassPath   → JARs available to the DRIVER (your script)
# spark.executor.extraClassPath → JARs available to EXECUTORS (worker processes)
#
# Both need the S3A JARs so that:
#   - The driver can plan and resolve s3a:// paths
#   - The executors can actually read/write the parquet data
# ============================================================================

spark.driver.extraClassPath     /opt/spark-extra-jars/*
spark.executor.extraClassPath   /opt/spark-extra-jars/*

# If the driver dies (Ctrl+C, crash) without calling spark.stop(), the master
# still reserves resources for the "dead" app.  These timeouts auto-clean it:
#   - worker.timeout: how long before master considers a silent worker dead
#   - app.lookupTimeout: how long to wait for a driver that stopped heartbeating
spark.worker.timeout            60
spark.app.lookupTimeout         30s
