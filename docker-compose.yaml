# Airflow cluster with CeleryExecutor, Redis, PostgreSQL, MinIO, and ClickHouse
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# Stack:
#   Source (MariaDB) -> Ingestion (Airflow/Python) -> Data Lake (MinIO/Parquet/CSV) 
#   -> Load (ClickHouse/S3 Engine) -> Transform (dbt-ClickHouse or native) -> Serving (MergeTree)

---
x-airflow-common:
  &airflow-common
  build: .
  env_file:
    - ${ENV_FILE_PATH:-.env}
  deploy:
    resources:
      limits:
        memory: 1G  # TODO: Limit each Airflow service to 512MB on prod
      reservations:
        memory: 512M
  environment:
    &airflow-common-env
    # -------------------------------------------------------------------------
    # Core Airflow Configuration
    # -------------------------------------------------------------------------
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    # Using postgres-oltp container (create 'airflow' db there: CREATE DATABASE airflow;)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://station:station@postgres-oltp:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://station:station@postgres-oltp:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'

    # -------------------------------------------------------------------------
    # Pre-configured Connections (Zero-Config Startup)
    # -------------------------------------------------------------------------
    # MinIO Connection (S3-compatible) - uses Amazon provider
    # Format: aws://<access_key>:<secret_key>@?endpoint_url=<url>&region_name=<region>
    # Note: endpoint_url must be URL-encoded (http://minio:9000 -> http%3A%2F%2Fminio%3A9000)
    AIRFLOW_CONN_AWS_DEFAULT: 'aws://minioadmin:minioadmin@?endpoint_url=http%3A%2F%2Fminio%3A9000&region_name=us-east-1'
    
    # ClickHouse Connection - uses airflow-clickhouse-plugin
    # Using JSON format for explicit control (avoids URI parsing issues)
    # The plugin uses clickhouse-driver (native protocol on port 9000)
    # No password for local dev (default user)
    AIRFLOW_CONN_CLICKHOUSE_DEFAULT: '{"conn_type": "clickhouse", "host": "clickhouse", "port": 9000, "login": "default", "password": "", "schema": "default"}'

  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - pipeline-net
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    # postgres:  # Using external Postgres
    #   condition: service_healthy
    postgres-oltp:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ============================================================================
  # Database and Message Broker Services
  # ============================================================================
  
  # NOTE: Commented out - using external Postgres instead
  # To re-enable: uncomment this service, add back depends_on entries,
  # and update AIRFLOW__DATABASE__SQL_ALCHEMY_CONN to point to postgres:5432
  # postgres:
  #   image: postgres:16
  #   container_name: postgres_airflow
  #   ports:
  #     - "9999:5432"
  #   environment:
  #     POSTGRES_USER: airflow
  #     POSTGRES_PASSWORD: airflow
  #     POSTGRES_DB: airflow
  #   volumes:
  #     - postgres-db-volume:/var/lib/postgresql/data
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #       reservations:
  #         memory: 256M
  #   healthcheck:
  #     test: ["CMD", "pg_isready", "-U", "airflow"]
  #     interval: 10s
  #     retries: 5
  #     start_period: 5s
  #   restart: always
  #   networks:
  #     - pipeline-net

  postgres-oltp:
    image: postgres:16
    container_name: postgres_oltp
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: station
      POSTGRES_PASSWORD: station
      POSTGRES_DB: station_oltp
    volumes:
      - postgres-oltp-volume:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "station", "-d", "station_oltp"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - pipeline-net
      
  redis:
    image: redis:7.2-bookworm
    container_name: redis_airflow
    expose:
      - 6379
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - pipeline-net

  # ============================================================================
  # Airflow Services
  # ============================================================================

  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow_apiserver
    command: api-server
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow_dag_processor
    command: dag-processor
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: airflow_worker
    command: celery worker
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow_triggerer
    command: triggerer
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        echo
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Running airflow config list to create default config file if missing."
        echo
        /entrypoint airflow config list >/dev/null
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        echo
        echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
        echo
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    depends_on:
      redis:
        condition: service_healthy
      # postgres:  # Using external Postgres
      #   condition: service_healthy
      postgres-oltp:
        condition: service_healthy
      minio:
        condition: service_healthy

  airflow-cli:
    <<: *airflow-common
    container_name: airflow_cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  flower:
    <<: *airflow-common
    container_name: airflow_flower
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ============================================================================
  # Data Lake: MinIO (S3-Compatible Object Storage)
  # ============================================================================

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio_lab
    ports:
      - "9000:9000"   # S3 API Port
      - "9001:9001"   # Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - pipeline-net

  # MinIO Client - Initializes buckets then exits
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Configuring MinIO client..."
        mc alias set myminio http://minio:9000 minioadmin minioadmin

        echo "Creating buckets..."
        mc mb --ignore-existing myminio/landing-zone      # Raw ingested data
        mc mb --ignore-existing myminio/staging           # Cleaned/transformed data
        mc mb --ignore-existing myminio/warehouse         # Final analytics-ready data
        mc mb --ignore-existing myminio/clickhouse-s3     # ClickHouse external storage

        echo "Setting bucket policies..."
        mc anonymous set download myminio/landing-zone
        mc anonymous set download myminio/staging
        mc anonymous set download myminio/warehouse
        mc anonymous set download myminio/clickhouse-s3

        echo "Bucket initialization complete!"
        mc ls myminio/
    networks:
      - pipeline-net

  # ============================================================================
  # Analytics Database: ClickHouse + ZooKeeper
  # ============================================================================

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper_lab
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat,mntr
    volumes:
      - zookeeper-data:/data
      - zookeeper-log:/datalog
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - pipeline-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_lab
    ports:
      - "8123:8123"   # HTTP Interface (REST API, JDBC)
      - "9002:9000"   # Native Interface (clickhouse-client, drivers)
    depends_on:
      zookeeper:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Only set the default database, don't mess with user creation
      CLICKHOUSE_DB: default
      # Allow connections without password for local dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      # Mount custom config for ZooKeeper and S3 integration
      - ./config/clickhouse_config.xml:/etc/clickhouse-server/config.d/custom_config.xml:ro
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "clickhouse-client", "--host", "localhost", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always
    networks:
      - pipeline-net

# ============================================================================
# Volumes
# ============================================================================

volumes:
  postgres-db-volume:
  postgres-oltp-volume:
  minio-data:
  zookeeper-data:
  zookeeper-log:
  clickhouse-data:
  clickhouse-logs:

# ============================================================================
# Networks
# ============================================================================

networks:
  pipeline-net:
    driver: bridge
    name: pipeline-net